name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore (from secret) or generate fallback
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > infra-bwx-keystore.jks
            echo "Keystore decoded from secret"
          elif [ ! -f infra-bwx-keystore.jks ]; then
            keytool -genkey -v -keystore infra-bwx-keystore.jks \
              -alias infra-bwx -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass infrabwx -keypass infrabwx \
              -dname "CN=InfraBWX, OU=CI, O=InfraBWX, L=Banyuwangi, ST=Jawa Timur, C=ID"
            echo "Fallback keystore generated (updates may conflict)"
          fi

      - name: Setup ccache
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ccache
          echo "CCACHE_DIR=/tmp/ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('*.kts', 'gradle/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: ${{ runner.os }}-gradle-build-cache-${{ hashFiles('*.kts', 'gradle/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-cache-

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: infra-bwx-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore (from secret) or generate fallback
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > infra-bwx-keystore.jks
            echo "Keystore decoded from secret"
          elif [ ! -f infra-bwx-keystore.jks ]; then
            keytool -genkey -v -keystore infra-bwx-keystore.jks \
              -alias infra-bwx -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass infrabwx -keypass infrabwx \
              -dname "CN=InfraBWX, OU=CI, O=InfraBWX, L=Banyuwangi, ST=Jawa Timur, C=ID"
            echo "Fallback keystore generated (updates may conflict)"
          fi

      - name: Setup ccache
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ccache
          echo "CCACHE_DIR=/tmp/ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=2G" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('*.kts', 'gradle/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-1
          key: ${{ runner.os }}-gradle-build-cache-${{ hashFiles('*.kts', 'gradle/*.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-build-cache-

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Get version
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            Automated build from main branch.
            Download the APK below and install on Android 12+ devices.
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
